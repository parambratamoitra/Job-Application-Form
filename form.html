<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detailed Job Application</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #e9ecef; padding: 20px; }
        .container { background: #fff; max-width: 900px; margin: 0 auto; padding: 30px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; border-bottom: 3px solid #3498db; padding-bottom: 10px; }
        .section { background: #f8f9fa; border: 1px solid #dee2e6; padding: 20px; border-radius: 8px; margin-bottom: 25px; }
        .section-title { font-weight: bold; font-size: 1.2rem; color: #3498db; margin-bottom: 15px; border-bottom: 1px solid #ddd; }
        .row { display: flex; gap: 15px; margin-bottom: 15px; flex-wrap: wrap; }
        .col { flex: 1; min-width: 200px; }
        label { display: block; font-weight: 600; margin-bottom: 5px; font-size: 0.9rem; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn { background: #2ecc71; color: white; padding: 15px; width: 100%; border: none; border-radius: 5px; font-size: 1.1rem; cursor: pointer; transition: 0.3s; }
        .btn:hover { background: #27ae60; }
    </style>
</head>
<body>

<div class="container">
    <h2>Employment Application</h2>

    <!-- ✅ FIXED HERE -->
    <form action="impl.php" method="POST" enctype="multipart/form-data">
        
        <div class="section">
            <div class="section-title">I. Personal Information</div>
            <div class="row">
                <div class="col"><label>Profile Photo</label><input type="file" name="photo" accept="image/*" required></div>
            </div>
            <div class="row">
                <div class="col"><label>First Name</label><input type="text" name="fname" required></div>
                <div class="col"><label>Middle Name</label><input type="text" name="mname"></div>
                <div class="col"><label>Last Name</label><input type="text" name="lname" required></div>
            </div>
            <div class="row">
                <div class="col"><label>Father's Name</label><input type="text" name="father_name" required></div>
                <div class="col"><label>Mother's Name</label><input type="text" name="mother_name" required></div>
            </div>
            <div class="row">
                <div class="col"><label>Mobile No.</label><input type="tel" name="mobile" required></div>
                <div class="col"><label>Optional Mobile</label><input type="tel" name="opt_mobile"></div>
                <div class="col"><label>Email</label><input type="email" name="email" required></div>
            </div>
            <div class="row">
                <div class="col"><label>Temporary Address</label><textarea name="temp_addr" rows="2" required></textarea></div>
                <div class="col"><label>Permanent Address</label><textarea name="perm_addr" rows="2" required></textarea></div>
            </div>
        </div>

        <div class="section">
            <div class="section-title">II. Educational Qualifications</div>
            <div class="row">
                <div class="col"><label>Class 10 (Board/Year/%)</label><input type="text" name="edu_10" required></div>
                <div class="col"><label>10+2 (Board/Year/%)</label><input type="text" name="edu_12" required></div>
            </div>
            <div class="row">
                <div class="col"><label>Graduation (Degree/Year/CGPA)</label><input type="text" name="edu_grad" required></div>
                <div class="col"><label>Masters (Degree/Year/CGPA)</label><input type="text" name="edu_mast"></div>
            </div>
        </div>

        <div class="section">
            <div class="section-title">III. Professional Details</div>
            <div class="row">
                <div class="col"><label>Technical Skills</label><input type="text" name="skills"></div>
                <div class="col"><label>Total Experience</label><input type="text" name="exp"></div>
            </div>
            <div class="row">
                <div class="col"><label>Upload Resume (PDF)</label><input type="file" name="resume" accept=".pdf" required></div>
            </div>
        </div>

        <button type="submit" class="btn">Submit Detailed Application</button>
    </form>
</div>

</body>
</html>
